<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Little Place For You ❤️</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#F78DA7">

<link rel="apple-touch-icon" href="assets/icons/icon-192.png">

</head>

<body class="login-page">

<div class="dap-blobs" id="dapBlobs"></div>
<div class="dap-pattern"></div>
<div class="dap-petals" id="dapPetals"></div>
<div class="background-glow"></div>

<h1>A Little Place Just For You</h1>

<p class="subtitle">

Before we step inside...

Tell me our special word.

</p>

<div class="password-container">

<input
id="password"
type="password"
placeholder="Our Secret Word">

<button id="togglePassword">

👁

</button>

</div>

<p id="error"></p>

<button id="unlock">

❤️ Open ❤️

</button>

<script src="login.js"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
    });
}
</script>

<script src="login.js"></script>
</body>
</html>
